<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Physical AI 논문 팔로우업</title>
<style>
  :root{
    --bg:#0f1115; --card:#171a21; --line:#262b36; --text:#e7eaf0;
    --muted:#9aa3b2; --accent:#6ea8fe; --tag:#1f2937; --tagtext:#a9c7ff;
    --bgtag:#3a2a12; --bgtagtext:#ffcf96;   /* 배경·문제 */
    --soltag:#12291d; --soltagtext:#9ff0c4;  /* 해결·방법 */
    --star:#f5b301; --starempty:#39404d;      /* 별점 */
  }
  @media (prefers-color-scheme: light){
    :root{ --bg:#f6f7f9; --card:#ffffff; --line:#e6e8ec; --text:#1a1d23;
      --muted:#5b6472; --accent:#2563eb; --tag:#eef2ff; --tagtext:#2846a8;
      --bgtag:#fdeede; --bgtagtext:#9a5a12; --soltag:#e5f6ec; --soltagtext:#1c7a45;
      --star:#e0a400; --starempty:#d7dbe2; }
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,"Segoe UI","Malgun Gothic",Roboto,sans-serif;
    line-height:1.65}
  .wrap{max-width:1000px;margin:0 auto;padding:32px 20px 64px}
  header{border-bottom:1px solid var(--line);padding-bottom:18px;margin-bottom:28px}
  h1{font-size:1.6rem;margin:0 0 6px}
  .sub{color:var(--muted);font-size:.92rem}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:22px 24px;margin-bottom:22px}
  .figwrap{margin:14px 0 4px}
  .fig{background:#000;border-radius:10px;overflow:hidden;display:flex;
    align-items:center;justify-content:center}
  .fig img{max-width:100%;max-height:440px;width:auto;height:auto;display:block}
  .fig .noimg{color:var(--muted);font-size:.85rem;padding:28px;text-align:center}
  .ptitle{font-size:1.12rem;font-weight:650;margin:0 0 6px}
  .ptitle a{color:var(--text);text-decoration:none}
  .ptitle a:hover{color:var(--accent);text-decoration:underline}
  .meta{color:var(--muted);font-size:.83rem;margin-bottom:10px}
  .tags{margin:10px 0}
  .tag{display:inline-block;background:var(--tag);color:var(--tagtext);
    font-size:.75rem;padding:3px 9px;border-radius:999px;margin:0 6px 6px 0}
  .section{margin-top:13px}
  .slabel{display:inline-block;font-size:.72rem;font-weight:700;letter-spacing:.02em;
    padding:2px 9px;border-radius:6px;margin-bottom:6px}
  .slabel.bg{background:var(--bgtag);color:var(--bgtagtext)}
  .slabel.sol{background:var(--soltag);color:var(--soltagtext)}
  .stext{margin:0;font-size:.95rem}
  .rating{display:flex;align-items:center;gap:9px;margin-top:16px}
  .rlabel{font-size:.72rem;font-weight:700;color:var(--muted)}
  .stars{position:relative;display:inline-block;font-size:1.1rem;line-height:1;
    letter-spacing:2px;color:var(--starempty)}
  .stars::before{content:"\2605\2605\2605\2605\2605"}
  .stars .fill{position:absolute;top:0;left:0;height:100%;overflow:hidden;
    white-space:nowrap;color:var(--star)}
  .stars .fill::before{content:"\2605\2605\2605\2605\2605"}
  .rnum{font-size:.8rem;color:var(--muted);font-weight:600}
  .rreason{color:var(--muted);font-size:.8rem;margin-top:5px}
  .figcap{color:var(--muted);font-size:.75rem;padding:6px 4px 0}
  footer{color:var(--muted);font-size:.8rem;text-align:center;margin-top:40px}
  .empty{color:var(--muted);text-align:center;padding:60px 0}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Physical AI 논문 팔로우업</h1>
    <div class="sub">최근 arXiv 신규 논문 · 대표 그림 + 한국어 요약(배경/해결) · ★ 논리·근거 견고함 평가 · 생성일 <span id="brief-date"></span></div>
  </header>
  <main id="papers"></main>
  <footer>follow-config.md 설정을 기반으로 자동 생성 · arXiv 데이터</footer>
</div>

<script>
/* ====== 코워크가 채웁니다 (BRIEF_DATE) ====== */

/* ====== 여기까지 ====== */

(function render(){
  document.getElementById("brief-date").textContent = BRIEF_DATE || "-";
  const root = document.getElementById("papers");
  if(!PAPERS.length){
    root.innerHTML = '<div class="empty">아직 채워진 논문이 없습니다.</div>';
    return;
  }
  root.innerHTML = PAPERS.map(p => `
    <article class="card">
      <h2 class="ptitle"><a href="${p.url}" target="_blank" rel="noopener">${p.title}</a></h2>
      <div class="meta">${p.authors} · ${p.date} · ${p.categories} · arXiv:${p.arxiv_id}</div>
      <div class="tags">${(p.topics||[]).map(t=>`<span class="tag">${t}</span>`).join("")}</div>
      <div class="figwrap">
        <div class="fig">
          ${p.image
            ? `<img src="${p.image}" alt="${p.title}">`
            : `<div class="noimg">대표 그림 없음</div>`}
        </div>
        ${p.figcap ? `<div class="figcap">${p.figcap}</div>` : ``}
      </div>
      <div class="section">
        <span class="slabel bg">배경 · 기존 문제</span>
        <p class="stext">${p.background || ""}</p>
      </div>
      <div class="section">
        <span class="slabel sol">해결 · 방법과 결과</span>
        <p class="stext">${p.solution || ""}</p>
      </div>
      ${p.rating != null ? `
      <div class="rating" title="논문 전체 논리와 근거의 견고함 평가 (별 5점)">
        <span class="rlabel">논리·근거</span>
        <span class="stars"><span class="fill" style="width:${Math.max(0,Math.min(5,p.rating))/5*100}%"></span></span>
        <span class="rnum">${Number(p.rating).toFixed(1)} / 5</span>
      </div>
      ${p.rating_reason ? `<div class="rreason">${p.rating_reason}</div>` : ``}` : ``}
    </article>`).join("");
})();
</script>
</body>
</html>
